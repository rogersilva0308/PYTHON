                    <h1 class="title">Cadastro de Produtos</h1>
                    <form method="POST">
                        <div class="row row-space">
                            <div class="col-2">
                                <div class="input-group">
                                    <label class="label">Produto</label>
                                    <input class="input--style-4" type="text" name="campo_produto" id="campo1">

                            </div>
                            <div class="col-2">
                                <div class="input-group">

                                    <input class="input--style-4" type="text" name="campo_fornecedor" id="campo2">
                                </div>
                            </div>
                        </div>
                        <div class="row row-space">

                                <div class="input-group">

                                    </div>
                                </div>
                            </div>

                                <div class="input-group">
                                    <label class="label">Notificar a cada venda?</label>
                                    <div class="p-t-10">
                                        <label class="radio-container m-r-45">Sim

                                            <span class="checkmark"></span>
                                        </label>
                                        <label class="radio-container">Não
                                            <input type="radio" name="gender" id="radiob2">
                                            <span class="checkmark"></span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>


                        <div class="p-t-15">
                            <button class="btn btn--radius-2 btn--blue" type="button" id="btn_registrar"
                                onclick="limparCampos()">Registrar
                                Produto</button>
                        </div>
                    </form>
                </div>
                <br>
            </div>
